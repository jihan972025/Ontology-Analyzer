appId: com.ontology-analyzer.app
productName: Ontology Analyzer
copyright: Copyright © 2024

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - dist-electron/**/*
  - node_modules/**/*

asarUnpack:
  - dist/**/*
  - dist-electron/**/*

extraResources:
  - from: dist-backend/main/
    to: backend/
  - from: dist-semgrep/semgrep/
    to: semgrep/

win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Ontology Analyzer
  deleteAppDataOnUninstall: true
